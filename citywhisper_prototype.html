<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityWhisper – Dein persönlicher Audio-Guide</title>
    <meta name="description"
        content="CityWhisper - KI-generierte personalisierte Audio-Guides für Städtereisen. Erlebe Städte wie ein Local.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwindcss.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #0a0e1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── Ambient glow ── */
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(180px);
            opacity: .25;
            pointer-events: none;
            z-index: 0;
        }

        .glow-1 {
            background: #0ea5e9;
            top: -200px;
            left: -150px;
        }

        .glow-2 {
            background: #6366f1;
            bottom: -250px;
            right: -150px;
        }

        /* ── Device mockup ── */
        .device-frame {
            position: relative;
            z-index: 1;
            width: 390px;
            height: 844px;
            border-radius: 50px;
            background: #1a1a2e;
            border: 3px solid rgba(255, 255, 255, .08);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, .04),
                0 25px 80px rgba(0, 0, 0, .6),
                0 0 120px rgba(14, 165, 233, .08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Notch */
        .device-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 32px;
            background: #1a1a2e;
            border-radius: 0 0 22px 22px;
            z-index: 200;
        }

        .device-notch::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .06);
            box-shadow: inset 0 0 2px rgba(255, 255, 255, .15);
        }

        /* Home indicator */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 5px;
            background: rgba(255, 255, 255, .25);
            border-radius: 10px;
            z-index: 200;
        }

        /* ── Status bar ── */
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            z-index: 150;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 28px 6px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            pointer-events: none;
        }

        /* ── App content area ── */
        .app-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f1422;
            position: relative;
            overflow: hidden;
        }

        /* ── Top bar (search + filters) ── */
        .top-bar {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 16px 10px;
            background: linear-gradient(to bottom, #0f1422 60%, transparent);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 14px;
            padding: 10px 14px;
            gap: 10px;
            backdrop-filter: blur(16px);
            transition: border-color .2s;
        }

        .search-box:focus-within {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, .15);
        }

        .search-box svg {
            flex-shrink: 0;
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, .35);
        }

        .filter-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .05);
            color: rgba(255, 255, 255, .7);
            cursor: pointer;
            transition: all .25s ease;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn:hover {
            background: rgba(14, 165, 233, .1);
            border-color: rgba(14, 165, 233, .3);
            color: #fff;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 3px 16px rgba(14, 165, 233, .35);
        }

        /* ── Map ── */
        #map {
            flex: 1;
            z-index: 1;
        }

        .leaflet-control-attribution {
            display: none !important;
        }

        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .4) !important;
        }

        .leaflet-control-zoom a {
            background: rgba(15, 20, 34, .92) !important;
            color: #fff !important;
            border: 1px solid rgba(255, 255, 255, .08) !important;
            backdrop-filter: blur(12px);
            width: 34px !important;
            height: 34px !important;
            line-height: 34px !important;
            font-size: 16px !important;
        }

        .leaflet-control-zoom a:first-child {
            border-radius: 10px 10px 0 0 !important;
        }

        .leaflet-control-zoom a:last-child {
            border-radius: 0 0 10px 10px !important;
        }

        /* Custom marker */
        .custom-marker {
            position: relative;
            width: 40px;
            height: 40px;
        }

        .marker-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border: 3px solid rgba(255, 255, 255, .9);
            box-shadow: 0 4px 16px rgba(14, 165, 233, .5), 0 0 0 6px rgba(14, 165, 233, .15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .marker-dot:hover {
            transform: scale(1.15);
            box-shadow: 0 4px 24px rgba(14, 165, 233, .6), 0 0 0 10px rgba(14, 165, 233, .12);
        }

        .marker-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(14, 165, 233, .25);
            animation: pulse-ring 2.5s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: .6;
            }

            100% {
                transform: translate(-50%, -50%) scale(2.4);
                opacity: 0;
            }
        }

        /* Active marker (on route) */
        .marker-dot.on-route {
            box-shadow: 0 4px 16px rgba(14, 165, 233, .5), 0 0 0 6px rgba(14, 165, 233, .25);
        }

        /* ── Route info bar ── */
        .route-bar {
            position: absolute;
            bottom: 28px;
            left: 16px;
            right: 16px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(15, 20, 34, .9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(14, 165, 233, .2);
            border-radius: 16px;
            transition: opacity .35s, transform .35s;
        }

        .route-bar.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
        }

        .route-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .route-info {
            flex: 1;
        }

        .route-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .route-meta {
            font-size: 11px;
            color: rgba(255, 255, 255, .45);
            display: flex;
            gap: 10px;
            margin-top: 2px;
        }

        .route-meta span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* Walking dot animation on route */
        .walking-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #0ea5e9;
            box-shadow: 0 0 12px #0ea5e9, 0 0 24px rgba(14, 165, 233, .4);
            border: 2px solid #fff;
        }

        /* ── Bottom Sheet ── */
        .bottom-sheet-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity .35s ease;
        }

        .bottom-sheet-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 310;
            background: linear-gradient(to bottom, #1a1f35, #141827);
            border-radius: 24px 24px 0 0;
            border-top: 1px solid rgba(255, 255, 255, .06);
            transform: translateY(100%);
            transition: transform .4s cubic-bezier(.32, .72, .24, 1);
            max-height: 65%;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .bottom-sheet::-webkit-scrollbar {
            display: none;
        }

        .bottom-sheet.open {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 36px;
            height: 4px;
            background: rgba(255, 255, 255, .2);
            border-radius: 4px;
            margin: 12px auto 0;
        }

        .sheet-content {
            padding: 16px 20px 30px;
        }

        .poi-category-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            background: rgba(14, 165, 233, .12);
            color: #38bdf8;
            margin-bottom: 8px;
        }

        .poi-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin: 0 0 4px;
            line-height: 1.2;
        }

        .poi-location {
            font-size: 13px;
            color: rgba(255, 255, 255, .4);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .poi-description {
            font-size: 14px;
            color: rgba(255, 255, 255, .6);
            line-height: 1.6;
            margin-bottom: 18px;
        }

        /* Route step indicator in bottom sheet */
        .route-step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            margin-bottom: 14px;
            background: rgba(14, 165, 233, .08);
            border: 1px solid rgba(14, 165, 233, .15);
            border-radius: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, .6);
        }

        .route-step-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        /* ── Audio Player ── */
        .audio-player {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .06);
            border-radius: 16px;
            padding: 14px 16px;
        }

        .audio-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .audio-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .audio-label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, .5);
            text-transform: uppercase;
            letter-spacing: .6px;
        }

        .audio-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .play-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(14, 165, 233, .4);
            flex-shrink: 0;
            transition: transform .15s, box-shadow .15s;
        }

        .play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 28px rgba(14, 165, 233, .55);
        }

        .play-btn:active {
            transform: scale(.95);
        }

        .play-btn svg {
            fill: #fff;
        }

        .progress-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, .08);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            border-radius: 4px;
            transition: width .15s linear;
        }

        .progress-times {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: rgba(255, 255, 255, .3);
            font-variant-numeric: tabular-nums;
        }

        /* Waveform animation */
        .waveform {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 20px;
        }

        .waveform .bar {
            width: 3px;
            background: #0ea5e9;
            border-radius: 2px;
            animation: waveform-bar 1s ease-in-out infinite alternate;
        }

        .waveform .bar:nth-child(1) {
            height: 6px;
            animation-delay: 0s;
        }

        .waveform .bar:nth-child(2) {
            height: 12px;
            animation-delay: .15s;
        }

        .waveform .bar:nth-child(3) {
            height: 8px;
            animation-delay: .3s;
        }

        .waveform .bar:nth-child(4) {
            height: 16px;
            animation-delay: .45s;
        }

        .waveform .bar:nth-child(5) {
            height: 10px;
            animation-delay: .6s;
        }

        .waveform.paused .bar {
            animation-play-state: paused;
        }

        @keyframes waveform-bar {
            0% {
                transform: scaleY(.4);
            }

            100% {
                transform: scaleY(1);
            }
        }

        /* Fade-up animation */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp .35s ease-out forwards;
        }

        /* Route dash animation */
        @keyframes dash-flow {
            to {
                stroke-dashoffset: -20;
            }
        }
    </style>
</head>

<body>

    <!-- Ambient background glows -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <!-- ═══════════ Device Frame ═══════════ -->
    <div class="device-frame">
        <div class="device-notch"></div>
        <div class="home-indicator"></div>

        <!-- Status bar -->
        <div class="status-bar">
            <span>9:41</span>
            <div style="display:flex;align-items:center;gap:6px;">
                <!-- Signal -->
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                    <rect x="0" y="8" width="3" height="4" rx="1" fill="#fff" />
                    <rect x="4.5" y="5" width="3" height="7" rx="1" fill="#fff" />
                    <rect x="9" y="2" width="3" height="10" rx="1" fill="#fff" />
                    <rect x="13.5" y="0" width="3" height="12" rx="1" fill="rgba(255,255,255,.3)" />
                </svg>
                <!-- WiFi -->
                <svg width="16" height="12" viewBox="0 0 16 12" fill="#fff">
                    <path
                        d="M8 10.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm-3.5-3a5.5 5.5 0 017 0 .75.75 0 01-1 1.1 4 4 0 00-5 0 .75.75 0 01-1-1.1zm-3-3a9 9 0 0113 0 .75.75 0 01-1 1.1 7.5 7.5 0 00-11 0A.75.75 0 011.5 4.5z"
                        transform="translate(0,-2)" />
                </svg>
                <!-- Battery -->
                <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
                    <rect x=".5" y=".5" width="22" height="11" rx="3" stroke="rgba(255,255,255,.4)" />
                    <rect x="2" y="2" width="15" height="8" rx="1.5" fill="#fff" />
                    <path d="M24 4.5v3a1.5 1.5 0 000-3z" fill="rgba(255,255,255,.4)" />
                </svg>
            </div>
        </div>

        <!-- App content -->
        <div class="app-content">

            <!-- Top bar -->
            <div class="top-bar">
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)"
                        stroke-width="2" stroke-linecap="round">
                        <circle cx="11" cy="11" r="7" />
                        <line x1="16.5" y1="16.5" x2="21" y2="21" />
                    </svg>
                    <input type="text" placeholder="Entdecke Amsterdam…" />
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.3)"
                        stroke-width="2" stroke-linecap="round">
                        <path d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </div>
                <div class="filter-row" id="filterRow">
                    <button class="filter-btn active" data-filter="all">✨ Alle</button>
                    <button class="filter-btn" data-filter="kunst">🎨 Kunst</button>
                    <button class="filter-btn" data-filter="coffee">☕ Coffee Shops</button>
                    <button class="filter-btn" data-filter="historisch">🏛️ Historisch</button>
                    <button class="filter-btn" data-filter="natur">🌿 Natur</button>
                    <button class="filter-btn" data-filter="food">🍽️ Food</button>
                </div>
            </div>

            <!-- Map -->
            <div id="map"></div>

            <!-- Floating route bar -->
            <div class="route-bar" id="routeBar">
                <div class="route-icon">🚶</div>
                <div class="route-info">
                    <div class="route-title">Amsterdam Highlights Tour</div>
                    <div class="route-meta">
                        <span>📍 12 Stops</span>
                        <span>🕐 ~2,5 Std.</span>
                        <span>🚶 4,8 km</span>
                    </div>
                </div>
            </div>

            <!-- Bottom sheet overlay -->
            <div class="bottom-sheet-overlay" id="sheetOverlay"></div>

            <!-- Bottom sheet -->
            <div class="bottom-sheet" id="bottomSheet">
                <div class="sheet-handle"></div>
                <div class="sheet-content" id="sheetContent">
                    <!-- Dynamic content injected by JS -->
                </div>
            </div>

        </div>
    </div>

    <!-- Hidden audio element for real playback -->
    <audio id="audioElement" preload="auto"></audio>

    <script>
        // ═══════════════════════════════════════
        // AUDIO FILES (rotating through available MP3s)
        // ═══════════════════════════════════════
        const audioFiles = ['demo_audio.mp3', 'audio_local.mp3', 'audio_historian.mp3'];
        const audioEl = document.getElementById('audioElement');

        // ═══════════════════════════════════════
        // POI DATA – 12 Points of Interest
        // ═══════════════════════════════════════
        const pois = [
            {
                id: 1, name: 'Rijksmuseum', category: 'kunst', emoji: '🎨',
                lat: 52.3600, lng: 4.8852, address: 'Museumstraat 1, Amsterdam', routeOrder: 1,
                snippet: 'Willkommen am Rijksmuseum! Vor dir steht eines der bedeutendsten Kunstmuseen der Welt. Rembrandt malte hier seine berühmte „Nachtwache" im Jahr 1642 – ein Auftragswerk für die Amsterdamer Bürgerwehr. Folge mir hinein und ich erzähle dir die Geheimnisse hinter den Meisterwerken…',
                audioTitle: 'Die Nachtwache – Rembrandts Meisterwerk', duration: '4:32'
            },
            {
                id: 2, name: 'Van Gogh Museum', category: 'kunst', emoji: '🎨',
                lat: 52.3584, lng: 4.8811, address: 'Museumplein 6, Amsterdam', routeOrder: 2,
                snippet: 'Direkt nebenan erwartet dich die weltweit größte Sammlung von Van Goghs Werken. Über 200 Gemälde, 500 Zeichnungen und 700 Briefe erzählen die Geschichte eines der einflussreichsten Künstler aller Zeiten. Wusstest du, dass Vincent zu Lebzeiten nur ein einziges Gemälde verkauft hat?',
                audioTitle: 'Van Gogh – Der verkannte Meister', duration: '5:18'
            },
            {
                id: 3, name: 'Stedelijk Museum', category: 'kunst', emoji: '🎨',
                lat: 52.3580, lng: 4.8798, address: 'Museumplein 10, Amsterdam', routeOrder: 3,
                snippet: 'Das Stedelijk Museum beherbergt eine der weltweit größten Sammlungen moderner und zeitgenössischer Kunst. Von Mondrian bis Warhol – hier triffst du auf die Avantgarde. Die ikonische „Badewanne" an der Fassade teilt die Amsterdamer bis heute…',
                audioTitle: 'Moderne Meister – Von Mondrian bis Heute', duration: '5:10'
            },
            {
                id: 4, name: 'Vondelpark', category: 'natur', emoji: '🌿',
                lat: 52.3579, lng: 4.8686, address: 'Vondelpark, Amsterdam', routeOrder: 4,
                snippet: 'Der Vondelpark ist das grüne Herz von Amsterdam. Auf 47 Hektar treffen sich hier Jogger, Musiker und Familien. Wusstest du, dass der Park nach dem Dichter Joost van den Vondel benannt ist? Geh den Weg entlang und entdecke versteckte Skulpturen…',
                audioTitle: 'Amsterdams grüne Oase', duration: '3:48'
            },
            {
                id: 5, name: 'The Pancake Bakery', category: 'food', emoji: '🍽️',
                lat: 52.3740, lng: 4.8830, address: 'Prinsengracht 191, Amsterdam', routeOrder: 5,
                snippet: 'Mitten an der Prinsengracht findest du The Pancake Bakery – ein Paradies für Pfannkuchen-Liebhaber seit 1973. In einem umgebauten Lagerhaus aus dem 17. Jahrhundert servieren sie über 75 verschiedene Pannenkoeken. Probier den „Indischen" mit Hühnchen und Erdnusssauce…',
                audioTitle: 'Pannenkoeken – Hollands süße Tradition', duration: '2:40'
            },
            {
                id: 6, name: 'Anne Frank Haus', category: 'historisch', emoji: '🏛️',
                lat: 52.3752, lng: 4.8840, address: 'Prinsengracht 263, Amsterdam', routeOrder: 6,
                snippet: 'Du stehst vor dem Haus, in dem sich Anne Frank über zwei Jahre lang versteckte. Hinter der unscheinbaren Fassade verbirgt sich eine der bewegendsten Geschichten des 20. Jahrhunderts. Lass mich dir erzählen, wie das Leben im Hinterhaus wirklich war…',
                audioTitle: 'Das Hinterhaus – Anne Franks Geschichte', duration: '6:15'
            },
            {
                id: 7, name: 'Westerkerk', category: 'historisch', emoji: '🏛️',
                lat: 52.3745, lng: 4.8833, address: 'Prinsengracht 281, Amsterdam', routeOrder: 7,
                snippet: 'Die Westerkerk, erbaut 1631, ist die größte Kirche der Niederlande. Ihr 85 Meter hoher Turm – die „Westertoren" – wird von einem blauen Kronenturm gekrönt, dem Symbol von Kaiser Maximilian I. Rembrandt wurde hier begraben, auch wenn sein genaues Grab unbekannt ist…',
                audioTitle: 'Die Westertoren – Klänge über den Grachten', duration: '3:25'
            },
            {
                id: 8, name: 'Café De Prins', category: 'coffee', emoji: '☕',
                lat: 52.3762, lng: 4.8865, address: 'Prinsengracht 124, Amsterdam', routeOrder: 8,
                snippet: 'Café De Prins ist eine echte Amsterdamer Institution seit 1975. Der Duft von frisch geröstetem Kaffee mischt sich mit der Geschichte der Grachten. Die Locals bestellen hier den „Koffie verkeerd" – Milchkaffee auf Holländisch. Setz dich ans Fenster…',
                audioTitle: 'Kaffeekultur an den Grachten', duration: '2:55'
            },
            {
                id: 9, name: 'Dam Platz', category: 'historisch', emoji: '🏛️',
                lat: 52.3731, lng: 4.8932, address: 'Dam, Amsterdam', routeOrder: 9,
                snippet: 'Der Dam ist das historische Herz von Amsterdam. Hier steht der Königspalast, einst als Rathaus erbaut – auf 13.659 Holzpfählen! Der Name „Amsterdam" leitet sich von einem Damm an der Amstel ab, der genau hier errichtet wurde. Drumherum pulsiert das moderne Leben…',
                audioTitle: 'Der Dam – Wo Amsterdam begann', duration: '4:05'
            },
            {
                id: 10, name: 'Bloemenmarkt', category: 'natur', emoji: '🌿',
                lat: 52.3663, lng: 4.8913, address: 'Singel, Amsterdam', routeOrder: 10,
                snippet: 'Der Bloemenmarkt ist der weltweit einzige schwimmende Blumenmarkt! Seit 1862 reihen sich hier Hausboote aneinander, beladen mit Tulpen, Orchideen und Souvenirs. Im Frühling leuchten tausende Tulpensorten in allen Farben – das perfekte Amsterdam-Erlebnis…',
                audioTitle: 'Tulpen auf dem Wasser', duration: '3:10'
            },
            {
                id: 11, name: 'Lot Sixty One', category: 'coffee', emoji: '☕',
                lat: 52.3635, lng: 4.8780, address: 'Kinkerstraat 112, Amsterdam', routeOrder: 11,
                snippet: 'Lot Sixty One ist die Caffeine-Bibel unter Amsterdams Specialty-Coffee-Szene. In dieser minimalistischen Rösterei dreht sich alles um Single-Origin-Bohnen und perfekte Extraktion. Die Baristas hier sind wahre Brüh-Künstler – jede Tasse ein Geschmackserlebnis…',
                audioTitle: 'Third Wave Coffee – Amsterdams Bohnen-Revolution', duration: '2:30'
            },
            {
                id: 12, name: 'Foodhallen', category: 'food', emoji: '🍽️',
                lat: 52.3625, lng: 4.8705, address: 'Bellamyplein 51, Amsterdam', routeOrder: 12,
                snippet: 'Die Foodhallen sind Amsterdams erste Indoor-Food-Market-Hall – untergebracht in einem historischen Straßenbahndepot aus 1902. Von vietnamesischem Pho über argentinische Empanadas bis hin zu frischen Oysters findest du hier die Welt auf einem Tablett…',
                audioTitle: 'Street Food Deluxe – Ein kulinarischer Roadtrip', duration: '3:35'
            }
        ];

        // ═══════════════════════════════════════
        // MAP SETUP
        // ═══════════════════════════════════════
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([52.3670, 4.8810], 14);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Dark map tiles (CartoDB Dark Matter Retina)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            subdomains: 'abcd'
        }).addTo(map);

        // ═══════════════════════════════════════
        // WALKING ROUTE (polyline connecting POIs in order)
        // ═══════════════════════════════════════
        const sortedPois = [...pois].sort((a, b) => a.routeOrder - b.routeOrder);

        // Build a smooth route with intermediate waypoints (simulating real streets)
        const routeCoords = [
            // 1: Rijksmuseum
            [52.3600, 4.8852],
            [52.3593, 4.8838],
            // 2: Van Gogh Museum
            [52.3584, 4.8811],
            [52.3581, 4.8805],
            // 3: Stedelijk Museum
            [52.3580, 4.8798],
            [52.3582, 4.8770],
            [52.3580, 4.8730],
            // 4: Vondelpark
            [52.3579, 4.8686],
            [52.3590, 4.8690],
            [52.3610, 4.8710],
            [52.3650, 4.8750],
            [52.3690, 4.8790],
            [52.3720, 4.8815],
            // 5: The Pancake Bakery
            [52.3740, 4.8830],
            // 6: Anne Frank Haus
            [52.3752, 4.8840],
            // 7: Westerkerk
            [52.3745, 4.8833],
            [52.3750, 4.8850],
            [52.3755, 4.8860],
            // 8: Café De Prins
            [52.3762, 4.8865],
            [52.3760, 4.8880],
            [52.3755, 4.8900],
            [52.3745, 4.8920],
            // 9: Dam Platz
            [52.3731, 4.8932],
            [52.3720, 4.8930],
            [52.3700, 4.8925],
            [52.3680, 4.8920],
            // 10: Bloemenmarkt
            [52.3663, 4.8913],
            [52.3660, 4.8890],
            [52.3650, 4.8850],
            [52.3640, 4.8810],
            // 11: Lot Sixty One
            [52.3635, 4.8780],
            [52.3630, 4.8750],
            [52.3628, 4.8720],
            // 12: Foodhallen
            [52.3625, 4.8705]
        ];

        // Route glow (wider, semi-transparent)
        L.polyline(routeCoords, {
            color: '#0ea5e9',
            weight: 8,
            opacity: 0.15,
            smoothFactor: 1.5,
            lineCap: 'round',
            lineJoin: 'round'
        }).addTo(map);

        // Main route line (dashed, animated via CSS)
        const routeLine = L.polyline(routeCoords, {
            color: '#0ea5e9',
            weight: 3,
            opacity: 0.7,
            dashArray: '10 10',
            smoothFactor: 1.5,
            lineCap: 'round',
            lineJoin: 'round'
        }).addTo(map);

        // Animate the dash pattern
        const routeElement = routeLine.getElement?.();
        if (routeElement) {
            routeElement.style.animation = 'dash-flow 1s linear infinite';
        }

        // Walking dot (animated marker that moves along the route)
        const walkingIcon = L.divIcon({
            html: '<div class="walking-dot"></div>',
            className: '',
            iconSize: [12, 12],
            iconAnchor: [6, 6]
        });
        const walkingMarker = L.marker(routeCoords[0], { icon: walkingIcon, zIndexOffset: 1000 }).addTo(map);

        // Animate walking dot along route
        let walkIdx = 0;
        let walkProgress = 0;
        function animateWalker() {
            walkProgress += 0.003;
            if (walkProgress >= 1) {
                walkProgress = 0;
                walkIdx = (walkIdx + 1) % (routeCoords.length - 1);
            }
            const from = routeCoords[walkIdx];
            const to = routeCoords[walkIdx + 1] || routeCoords[0];
            const lat = from[0] + (to[0] - from[0]) * walkProgress;
            const lng = from[1] + (to[1] - from[1]) * walkProgress;
            walkingMarker.setLatLng([lat, lng]);
            requestAnimationFrame(animateWalker);
        }
        animateWalker();

        // ═══════════════════════════════════════
        // MARKERS
        // ═══════════════════════════════════════
        const markers = [];

        pois.forEach(poi => {
            const markerHtml = `
        <div class="custom-marker">
          <div class="marker-pulse"></div>
          <div class="marker-dot on-route">${poi.emoji}</div>
        </div>`;

            const icon = L.divIcon({
                html: markerHtml,
                className: '',
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });

            const marker = L.marker([poi.lat, poi.lng], { icon })
                .addTo(map)
                .on('click', () => openSheet(poi));

            markers.push({ marker, poi });
        });

        // ═══════════════════════════════════════
        // FILTER LOGIC
        // ═══════════════════════════════════════
        const filterRow = document.getElementById('filterRow');
        let activeFilter = 'all';

        filterRow.addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;

            filterRow.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            activeFilter = btn.dataset.filter;
            closeSheet();

            markers.forEach(({ marker, poi }) => {
                if (activeFilter === 'all' || poi.category === activeFilter) {
                    marker.addTo(map);
                } else {
                    map.removeLayer(marker);
                }
            });
        });

        // ═══════════════════════════════════════
        // BOTTOM SHEET
        // ═══════════════════════════════════════
        const bottomSheet = document.getElementById('bottomSheet');
        const sheetOverlay = document.getElementById('sheetOverlay');
        const sheetContent = document.getElementById('sheetContent');
        const routeBar = document.getElementById('routeBar');

        let isPlaying = false;
        let progressInterval = null;
        let currentProgress = 0;

        function openSheet(poi) {
            // Stop any current audio playback
            audioEl.pause();
            audioEl.currentTime = 0;
            clearInterval(progressInterval);
            isPlaying = false;
            currentProgress = 0;

            // Pick an audio file (rotate based on POI id)
            audioEl.src = audioFiles[(poi.id - 1) % audioFiles.length];

            const totalPois = pois.length;

            sheetContent.innerHTML = `
        <div class="fade-up">
          <div class="poi-category-badge">${poi.emoji} ${getCategoryLabel(poi.category)}</div>
          <h2 class="poi-title">${poi.name}</h2>
          <div class="poi-location">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${poi.address}
          </div>

          <div class="route-step">
            <div class="route-step-num">${poi.routeOrder}</div>
            <span>Stop ${poi.routeOrder} von ${totalPois} auf deiner Route</span>
          </div>

          <p class="poi-description">"${poi.snippet}"</p>

          <div class="audio-player">
            <div class="audio-header">
              <div class="audio-icon">🎙️</div>
              <span class="audio-label">CityWhisper Audio Guide</span>
            </div>
            <div class="audio-title">${poi.audioTitle}</div>
            <div class="audio-controls">
              <button class="play-btn" id="playBtn" onclick="togglePlay()">
                <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </button>
              <div class="progress-area">
                <div class="progress-bar-bg" id="progressBarBg" onclick="seekAudio(event)">
                  <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="progress-times">
                  <span id="currentTime">0:00</span>
                  <span id="totalTime">${poi.duration}</span>
                </div>
              </div>
              <div class="waveform paused" id="waveform">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
              </div>
            </div>
          </div>
        </div>`;

            bottomSheet.classList.add('open');
            sheetOverlay.classList.add('visible');
            routeBar.classList.add('hidden');

            // Update total time when audio metadata loads
            audioEl.addEventListener('loadedmetadata', updateTotalTime, { once: true });
        }

        function updateTotalTime() {
            const total = document.getElementById('totalTime');
            if (total && audioEl.duration && isFinite(audioEl.duration)) {
                total.textContent = formatSeconds(audioEl.duration);
            }
        }

        function closeSheet() {
            bottomSheet.classList.remove('open');
            sheetOverlay.classList.remove('visible');
            routeBar.classList.remove('hidden');
            audioEl.pause();
            audioEl.currentTime = 0;
            clearInterval(progressInterval);
            isPlaying = false;
            currentProgress = 0;
        }

        sheetOverlay.addEventListener('click', closeSheet);

        function getCategoryLabel(cat) {
            const labels = {
                kunst: 'Kunst & Kultur',
                coffee: 'Coffee Shop',
                historisch: 'Historisch',
                natur: 'Natur & Parks',
                food: 'Food & Drinks'
            };
            return labels[cat] || cat;
        }

        // ═══════════════════════════════════════
        // AUDIO PLAYER – REAL PLAYBACK
        // ═══════════════════════════════════════
        function togglePlay() {
            isPlaying = !isPlaying;
            const playIcon = document.getElementById('playIcon');
            const waveform = document.getElementById('waveform');

            if (isPlaying) {
                audioEl.play().catch(() => {
                    // If real audio fails, fall back to simulation
                    startSimulation();
                });

                playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
                waveform.classList.remove('paused');

                // Update progress from real audio
                clearInterval(progressInterval);
                progressInterval = setInterval(() => {
                    if (audioEl.duration && isFinite(audioEl.duration)) {
                        const pct = (audioEl.currentTime / audioEl.duration) * 100;
                        const fill = document.getElementById('progressFill');
                        const timeEl = document.getElementById('currentTime');
                        if (fill) fill.style.width = pct + '%';
                        if (timeEl) timeEl.textContent = formatSeconds(audioEl.currentTime);

                        if (audioEl.ended) {
                            isPlaying = false;
                            playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                            waveform.classList.add('paused');
                            clearInterval(progressInterval);
                        }
                    }
                }, 100);
            } else {
                audioEl.pause();
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                waveform.classList.add('paused');
                clearInterval(progressInterval);
            }
        }

        // Fallback simulation if audio file not found
        function startSimulation() {
            clearInterval(progressInterval);
            let simProgress = currentProgress;
            progressInterval = setInterval(() => {
                simProgress += 0.35;
                if (simProgress >= 100) {
                    simProgress = 0;
                    isPlaying = false;
                    const playIcon = document.getElementById('playIcon');
                    const waveform = document.getElementById('waveform');
                    if (playIcon) playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                    if (waveform) waveform.classList.add('paused');
                    clearInterval(progressInterval);
                }
                const fill = document.getElementById('progressFill');
                const timeEl = document.getElementById('currentTime');
                if (fill) fill.style.width = simProgress + '%';
                if (timeEl) timeEl.textContent = formatTime(simProgress);
                currentProgress = simProgress;
            }, 100);
        }

        function seekAudio(e) {
            const bar = document.getElementById('progressBarBg');
            const rect = bar.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));

            if (audioEl.duration && isFinite(audioEl.duration)) {
                audioEl.currentTime = pct * audioEl.duration;
            }

            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = (pct * 100) + '%';
            const timeEl = document.getElementById('currentTime');
            if (timeEl) {
                if (audioEl.duration && isFinite(audioEl.duration)) {
                    timeEl.textContent = formatSeconds(audioEl.currentTime);
                } else {
                    timeEl.textContent = formatTime(pct * 100);
                }
            }
        }

        function formatSeconds(sec) {
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function formatTime(progress) {
            const totalSeconds = Math.floor((progress / 100) * 300);
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // ═══════════════════════════════════════
        // TOUCH / SWIPE – close sheet on drag down
        // ═══════════════════════════════════════
        let touchStartY = 0;
        bottomSheet.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        });
        bottomSheet.addEventListener('touchmove', e => {
            const diff = e.touches[0].clientY - touchStartY;
            if (diff > 80) closeSheet();
        });
    </script>
</body>

</html>
