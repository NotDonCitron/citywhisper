<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityWhisper – Schönau & Mannheim</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: white;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
            position: absolute;
            top: 0;
            left: 0;
            background: #0a0e1a;
        }

        .leaflet-tile-container img {
            box-shadow: 0 0 1px rgba(0, 0, 0, 0.05);
            border: none !important;
        }

        .leaflet-container {
            background: #0a0e1a !important;
            outline: 0;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        .pointer-all {
            pointer-events: auto;
        }

        .custom-marker {
            position: relative;
            width: 40px;
            height: 40px;
        }

        .marker-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #0ea5e9;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .user-location-dot {
            width: 20px;
            height: 20px;
            background: #4285F4;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(66, 133, 244, 0.8);
        }

        .bottom-sheet {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(150%);
            width: 92%;
            max-width: 420px;
            background: rgba(20, 24, 39, 0.95);
            backdrop-blur: 30px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 300;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .bottom-sheet.open {
            transform: translateX(-50%) translateY(0);
        }

        .poi-hero-img {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            background: #1a1f2e;
        }

        .poi-hero-img img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            display: block !important;
            opacity: 1 !important;
        }

        .poi-hero-img::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(20, 24, 39, 1), transparent);
        }

        .audio-player {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 12px 16px;
            margin: 15px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #0ea5e9;
            width: 0%;
            transition: width 0.1s linear;
        }

        .control-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .control-btn.on {
            background: #0ea5e9;
            color: white;
            border-color: transparent;
        }

        .control-btn.off {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
        }

        .city-switcher {
            position: absolute;
            top: 80px;
            left: 16px;
            z-index: 200;
        }

        .route-controls {
            position: absolute;
            top: 130px;
            left: 16px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .poi-chip {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 14px;
            font-size: 13px;
            cursor: pointer;
        }

        .poi-chip.selected {
            background: #0ea5e9;
            border-color: white;
        }

        .persona-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .persona-btn.active {
            border-color: #0ea5e9;
            background: rgba(14, 165, 233, 0.15);
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <div class="ui-layer">
        <div class="p-4 flex justify-between items-center pointer-all bg-gradient-to-b from-[#0a0e1a] to-transparent">
            <div
                class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 flex items-center gap-2">
                <span class="font-bold text-[#0ea5e9]">City</span>Whisper
            </div>
            <div class="flex gap-2 bg-white/5 backdrop-blur-md p-1.5 rounded-full border border-white/10"
                id="personaSelector">
                <button onclick="selectPersona('historian')" class="persona-btn" title="Historiker">📜</button>
                <button onclick="selectPersona('insider')" class="persona-btn active" title="Insiderin">🕶️</button>
            </div>
            <div class="flex gap-2">
                <button id="autoPlayBtn" onclick="toggleAutoPlay()" class="control-btn on pointer-all">⚡</button>
                <button id="audioMasterBtn" onclick="toggleAudioMaster()" class="control-btn on pointer-all">🔊</button>
                <button id="routeBtn" onclick="toggleRouteBuilder()" class="control-btn off pointer-all">🗺️</button>
            </div>
        </div>
        <button id="recenterBtn" onclick="enableFollow()"
            class="absolute bottom-24 right-6 pointer-all bg-[#0ea5e9] text-white p-4 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all hidden"
            style="z-index: 200;">🎯</button>
        <div id="routeBuilder" class="route-controls pointer-all hidden">
            <div class="bg-black/70 backdrop-blur-xl p-5 rounded-3xl border border-white/10 w-72 shadow-2xl">
                <h3 class="text-sm font-bold mb-4 flex items-center gap-2">📍 Tour zusammenstellen</h3>
                <div id="poiList" class="flex flex-wrap gap-2 mb-5"></div>
                <button onclick="generateRoute()"
                    class="w-full bg-[#0ea5e9] text-white py-3 rounded-2xl text-sm font-bold">Weg berechnen</button>
            </div>
        </div>
        <div class="city-switcher flex gap-2 pointer-all">
            <button onclick="gotoCity('Schoenau')"
                class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full text-xs border border-white/10 hover:bg-[#0ea5e9]/20 transition-all">🏘️
                Schönau</button>
            <button onclick="gotoCity('Mannheim')"
                class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full text-xs border border-white/10 hover:bg-[#0ea5e9]/20 transition-all">🏙️
                Mannheim</button>
            <button onclick="startDemoWalk()"
                class="bg-[#0ea5e9]/20 backdrop-blur-md px-4 py-2 rounded-full text-xs border border-[#0ea5e9]/30 text-[#0ea5e9] font-bold">🏃
                Demo</button>
        </div>
        <div id="bottomSheet" class="bottom-sheet pointer-all">
            <div class="poi-hero-img"><img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" id="poiImg"
                    alt=""></div>
            <div class="px-6 pb-8 overflow-y-auto">
                <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto my-4 cursor-pointer" onclick="closeSheet()">
                </div>
                <h2 class="text-2xl font-bold mb-1 leading-tight" id="poiName">POI Name</h2>
                <p class="text-[#0ea5e9] text-sm font-bold tracking-wide uppercase mb-4" id="poiCity">Stadt</p>
                <div class="audio-player">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="bg-[#0ea5e9]/20 text-[#0ea5e9] p-2.5 rounded-xl text-xl">🎙️</div>
                            <div>
                                <div class="text-[10px] font-black uppercase tracking-widest opacity-40">Guide Audio
                                </div>
                                <div class="text-xs font-semibold" id="audioStatus">Bereit</div>
                            </div>
                        </div>
                        <button onclick="togglePlayback()" id="playPauseBtn"
                            class="bg-white text-black w-11 h-11 rounded-full flex items-center justify-center text-xl font-bold shadow-xl">▶️</button>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>
                <div id="scriptText" class="text-[15px] leading-relaxed opacity-70 font-medium"></div>
            </div>
        </div>
    </div>
    <audio id="audioElement"></audio>
    <script>
        const BACKEND_URL = window.location.origin;
        const GEOFENCE_RADIUS = 50;
        let pois = [], markers = [], userLocationMarker = null, lastTriggeredPoiId = null, selectedPoiIds = [], currentRouteLayer = null;
        let selectedPersona = 'insider', isAppInitialized = false, shouldFollowUser = true, isAudioMasterOn = true, isAutoPlayOn = true, lastCalculatedRoutePoints = [];

        const map = L.map('map', { zoomControl: false, attributionControl: false, fadeAnimation: true }).setView([49.4355, 8.8090], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        map.on('dragstart', () => { shouldFollowUser = false; document.getElementById('recenterBtn').classList.remove('hidden'); });

        function enableFollow() { initApp(); shouldFollowUser = true; document.getElementById('recenterBtn').classList.add('hidden'); if (userLocationMarker) map.panTo(userLocationMarker.getLatLng()); }
        function initApp() { if (isAppInitialized) return; isAppInitialized = true; const audio = document.getElementById('audioElement'); audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(e => { }); }
        function toggleAudioMaster() { isAudioMasterOn = !isAudioMasterOn; const btn = document.getElementById('audioMasterBtn'); btn.innerText = isAudioMasterOn ? '🔊' : '🔇'; btn.classList.toggle('on', isAudioMasterOn); btn.classList.toggle('off', !isAudioMasterOn); if (!isAudioMasterOn) document.getElementById('audioElement').pause(); }
        function toggleAutoPlay() { isAutoPlayOn = !isAutoPlayOn; const btn = document.getElementById('autoPlayBtn'); btn.innerText = isAutoPlayOn ? '⚡' : '🔘'; btn.classList.toggle('on', isAutoPlayOn); btn.classList.toggle('off', !isAutoPlayOn); }
        function selectPersona(id) { initApp(); selectedPersona = id; document.querySelectorAll('.persona-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('onclick').includes(id))); }

        async function loadData() {
            try {
                const res = await fetch(`${BACKEND_URL}/pois`);
                pois = await res.json();
                renderMarkers();
                renderPoiChips();
                preloadPoiImages(); // Preload images for instant display
                startGpsTracking();
            } catch (e) { console.error(e); }
        }

        function startGpsTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    const latlng = [latitude, longitude];
                    if (!userLocationMarker) { userLocationMarker = L.marker(latlng, { icon: L.divIcon({ html: '<div class="user-location-dot"></div>', className: '', iconSize: [20, 20] }) }).addTo(map); }
                    else { userLocationMarker.setLatLng(latlng); }
                    if (shouldFollowUser) map.panTo(latlng);
                    if (isAppInitialized) checkGeofences(latitude, longitude);
                }, err => { }, { enableHighAccuracy: true });
            }
        }

        function renderPoiChips() { const list = document.getElementById('poiList'); list.innerHTML = pois.map(poi => `<div class="poi-chip ${selectedPoiIds.includes(poi.id) ? 'selected' : ''}" onclick="togglePoiSelection('${poi.id}')">${poi.emoji} ${poi.name.split(' ')[0]}</div>`).join(''); }
        function togglePoiSelection(id) { initApp(); if (selectedPoiIds.includes(id)) selectedPoiIds = selectedPoiIds.filter(i => i !== id); else { if (selectedPoiIds.length >= 12) return alert("Max 12 POIs"); selectedPoiIds.push(id); } renderPoiChips(); }
        function toggleRouteBuilder() { initApp(); document.getElementById('routeBuilder').classList.toggle('hidden'); document.getElementById('routeBtn').classList.toggle('on'); document.getElementById('routeBtn').classList.toggle('off'); }

        async function generateRoute() {
            initApp();
            if (selectedPoiIds.length < 2) return alert("Min 2 Orte");
            const btn = document.querySelector('#routeBuilder button');
            btn.innerText = "Berechne...";
            try {
                const res = await fetch(`${BACKEND_URL}/route`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ poi_ids: selectedPoiIds }) });
                const data = await res.json();
                lastCalculatedRoutePoints = data.geometry.coordinates.map(c => ({ lat: c[1], lng: c[0] }));
                if (currentRouteLayer) map.removeLayer(currentRouteLayer);
                currentRouteLayer = L.geoJSON(data.geometry, { style: { color: '#0ea5e9', weight: 8, opacity: 0.9, dashArray: '1, 15', lineCap: 'round' } }).addTo(map);
                map.fitBounds(currentRouteLayer.getBounds(), { padding: [60, 60] });
                toggleRouteBuilder();
            } catch (e) { alert("Fehler"); } finally { btn.innerText = "Weg berechnen"; }
        }

        function renderMarkers() { markers.forEach(m => map.removeLayer(m.marker)); pois.forEach(poi => { const marker = L.marker([poi.lat, poi.lng], { icon: L.divIcon({ html: `<div class="custom-marker"><div class="marker-dot">${poi.emoji}</div></div>`, className: '', iconSize: [40, 40], iconAnchor: [20, 20] }) }).addTo(map).on('click', () => openSheet(poi, true)); markers.push({ marker, poi }); }); }
        function gotoCity(city) { initApp(); if (city === 'Schoenau') map.setView([49.4355, 8.8090], 16); else map.setView([49.4836, 8.4660], 15); }

        // Robust image loading with multiple fallback strategies
        async function loadPoiImage(imgElement, imageData) {
            // imageData is now an object: { direct, proxied, cached, fallback }
            const fallbackUrl = imageData.fallback || `${BACKEND_URL}/static/fallback.svg`;

            // Reset and show loading state
            imgElement.style.opacity = '0';
            imgElement.src = '';

            // Strategy 1: Try cached local image first (fastest, no external requests)
            if (imageData.cached) {
                try {
                    const cachedUrl = imageData.cached.startsWith('/') ? `${BACKEND_URL}${imageData.cached}` : imageData.cached;
                    console.log('Trying cached:', cachedUrl);
                    await loadImageWithTimeout(imgElement, cachedUrl, 5000);
                    return; // Success!
                } catch (e) {
                    console.log('Cached image failed, trying proxy...', e);
                }
            }

            // Strategy 2: Try proxied URL (has CORS headers, reliable)
            if (imageData.proxied) {
                try {
                    const proxyUrl = imageData.proxied.startsWith('/') ? `${BACKEND_URL}${imageData.proxied}` : imageData.proxied;
                    console.log('Trying proxy:', proxyUrl);
                    await loadImageWithTimeout(imgElement, proxyUrl, 10000);
                    return; // Success!
                } catch (e) {
                    console.log('Proxied image failed, trying direct...', e);
                }
            }

            // Strategy 3: Try direct URL as last resort
            if (imageData.direct) {
                try {
                    console.log('Trying direct:', imageData.direct);
                    await loadImageWithTimeout(imgElement, imageData.direct, 8000);
                    return; // Success!
                } catch (e) {
                    console.log('Direct image failed, using fallback...', e);
                }
            }

            // Strategy 4: Use fallback (always works)
            console.log('Using fallback:', fallbackUrl);
            imgElement.src = fallbackUrl;
            imgElement.onload = () => {
                imgElement.style.opacity = '1';
            };
        }

        // Helper: Load image - fires onload OR onerror but doesn't reject Promise
        function loadImageWithTimeout(imgElement, url, timeout) {
            return new Promise((resolve, reject) => {
                // Set a timeout that will reject
                const timeoutId = setTimeout(() => {
                    reject(new Error('Timeout'));
                }, timeout);

                // onload - image loaded successfully
                imgElement.onload = () => {
                    clearTimeout(timeoutId);
                    imgElement.style.opacity = '1';
                    console.log('Image loaded:', url);
                    resolve(); // Success - stop here
                };

                // onerror - image failed but DON'T reject (might already be loaded from cache)
                // Just log it, the image might still display due to onload firing first
                imgElement.onerror = () => {
                    clearTimeout(timeoutId);
                    console.log('Image error (may still display):', url);
                    // Don't reject - just resolve so we don't cascade to fallbacks
                    resolve();
                };

                imgElement.src = url;
            });
        }

        // Preload images for all POIs (improves UX)
        // Note: Disabled - uses wrong URLs. Images load correctly via openSheet()
        function preloadPoiImages() {
            // Images are now loaded via openSheet() which uses the API with proper caching
            // This preload function caused OpaqueResponseBlocking issues with Wikipedia URLs
            console.log('Preload disabled - using openSheet for image loading');
        }

        async function openSheet(poi, isManual = false) {
            initApp();
            const sheet = document.getElementById('bottomSheet');
            const audio = document.getElementById('audioElement');
            const img = document.getElementById('poiImg');

            // Reset image to loading state immediately
            img.style.opacity = '0';
            img.src = '';

            document.getElementById('poiName').innerText = poi.name;
            document.getElementById('poiCity').innerText = poi.city;
            document.getElementById('scriptText').innerText = "Wird geladen...";
            document.getElementById('audioStatus').innerText = "Lädt...";
            document.getElementById('progressFill').style.width = '0%';

            sheet.classList.add('open');

            try {
                const res = await fetch(`${BACKEND_URL}/poi/${poi.id}/audio?persona=${selectedPersona}`);
                const data = await res.json();
                document.getElementById('scriptText').innerText = data.script;

                // Load image with robust fallback system
                if (data.image) {
                    await loadPoiImage(img, data.image);
                } else {
                    // No image data at all - use fallback
                    img.src = `${BACKEND_URL}/static/fallback.svg`;
                    img.style.opacity = '1';
                }

                audio.src = data.audio_url;
                const shouldPlay = isManual || (isAudioMasterOn && isAutoPlayOn);
                if (shouldPlay && isAudioMasterOn) {
                    audio.play();
                    document.getElementById('audioStatus').innerText = "Wird erzählt...";
                    document.getElementById('playPauseBtn').innerText = '⏸️';
                } else {
                    document.getElementById('audioStatus').innerText = "Bereit";
                    document.getElementById('playPauseBtn').innerText = '▶️';
                }
                updateProgress();
            } catch (e) {
                console.error('Error loading POI:', e);
                document.getElementById('audioStatus').innerText = "Fehler";
                // Show fallback image on any error
                img.src = `${BACKEND_URL}/static/fallback.svg`;
                img.style.opacity = '1';
            }
        }

        function togglePlayback() { const audio = document.getElementById('audioElement'); const btn = document.getElementById('playPauseBtn'); if (audio.paused) { audio.play(); btn.innerText = '⏸️'; document.getElementById('audioStatus').innerText = "Wird erzählt..."; } else { audio.pause(); btn.innerText = '▶️'; } }
        function updateProgress() { const audio = document.getElementById('audioElement'); const fill = document.getElementById('progressFill'); const interval = setInterval(() => { if (audio.duration) { const pct = (audio.currentTime / audio.duration) * 100; fill.style.width = pct + '%'; } if (audio.ended || !document.getElementById('bottomSheet').classList.contains('open')) { clearInterval(interval); if (audio.ended) document.getElementById('playPauseBtn').innerText = '▶️'; } }, 100); }
        function closeSheet() { document.getElementById('bottomSheet').classList.remove('open'); document.getElementById('audioElement').pause(); }

        function checkGeofences(uLat, uLng) {
            pois.forEach(poi => {
                const dist = Math.sqrt(Math.pow(uLat - poi.lat, 2) + Math.pow(uLng - poi.lng, 2)) * 111320;
                if (dist < GEOFENCE_RADIUS && lastTriggeredPoiId !== poi.id) {
                    lastTriggeredPoiId = poi.id;
                    openSheet(poi, false);
                }
            });
        }

        function startDemoWalk() {
            initApp(); shouldFollowUser = true; document.getElementById('recenterBtn').classList.add('hidden');
            const path = lastCalculatedRoutePoints.length > 0 ? lastCalculatedRoutePoints : [{ lat: 49.4836, lng: 8.4751 }, { lat: 49.4862, lng: 8.4665 }, { lat: 49.4831, lng: 8.4622 }];
            let currentStep = 0;
            const interval = setInterval(() => {
                if (currentStep >= path.length) { clearInterval(interval); return; }
                const pos = path[currentStep];
                if (!userLocationMarker) userLocationMarker = L.marker([pos.lat, pos.lng], { icon: L.divIcon({ html: '<div class="user-location-dot"></div>', className: '', iconSize: [20, 20] }) }).addTo(map);
                else userLocationMarker.setLatLng([pos.lat, pos.lng]);
                if (shouldFollowUser) map.panTo([pos.lat, pos.lng]);
                checkGeofences(pos.lat, pos.lng);
                currentStep++;
            }, 150);
        }
        loadData();
    </script>
</body>

</html>
