<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityWhisper – Schönau & Mannheim</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0ea5e9">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: white; margin: 0; overflow: hidden; height: 100vh; }
        #map { height: 100vh; width: 100vw; z-index: 1; position: absolute; top: 0; left: 0; }
        .ui-layer { position: absolute; top: 0; left: 0; z-index: 100; pointer-events: none; width: 100%; height: 100%; }
        .pointer-all { pointer-events: auto; }
        .custom-marker { position: relative; width: 40px; height: 40px; }
        .marker-dot { width: 40px; height: 40px; border-radius: 50%; background: #0ea5e9; border: 3px solid white; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .user-location-dot { width: 20px; height: 20px; background: #4285F4; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px rgba(66, 133, 244, 0.8); }
        .bottom-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: #141827; border-radius: 24px 24px 0 0; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0.24, 1); padding: 20px; z-index: 300; max-height: 60%; overflow-y: auto; }
        .bottom-sheet.open { transform: translateY(0); }
        .start-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 500; }
        .audio-player { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; margin-top: 15px; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #0ea5e9; width: 0%; transition: width 0.1s linear; }
        .city-switcher { position: absolute; top: 80px; left: 16px; z-index: 200; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="ui-layer">
        <!-- Top Bar -->
        <div class="p-4 flex justify-between items-center pointer-all bg-gradient-to-b from-[#0a0e1a] to-transparent">
            <div class="bg-white/10 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
                <span class="font-bold text-[#0ea5e9]">City</span>Whisper <span class="text-xs opacity-50 ml-2">v0.2 Live</span>
            </div>
        </div>

        <!-- City Switcher -->
        <div class="city-switcher flex gap-2 pointer-all">
            <button onclick="gotoCity('Schoenau')" class="bg-white/10 backdrop-blur-md px-3 py-1 rounded-full text-xs border border-white/10 hover:bg-[#0ea5e9]/20">🏘️ Schönau</button>
            <button onclick="gotoCity('Mannheim')" class="bg-white/10 backdrop-blur-md px-3 py-1 rounded-full text-xs border border-white/10 hover:bg-[#0ea5e9]/20">🏙️ Mannheim</button>
        </div>

        <!-- Start Button -->
        <div class="start-overlay" id="startBtnContainer">
            <button onclick="startTour()" class="pointer-all bg-[#0ea5e9] text-white px-8 py-4 rounded-full font-bold shadow-2xl hover:scale-105 active:scale-95 transition-transform flex items-center gap-3">
                <span>🚀</span> CityWhisper starten
            </button>
        </div>

        <!-- Bottom Sheet -->
        <div id="bottomSheet" class="bottom-sheet pointer-all shadow-2xl">
            <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-4" onclick="closeSheet()"></div>
            <div id="sheetContent"></div>
        </div>
    </div>

    <audio id="audioElement"></audio>

    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); }); }

        const BACKEND_URL = window.location.origin;
        let pois = [];
        let markers = [];
        let userLocationMarker = null;
        let lastTriggeredPoiId = null;
        const GEOFENCE_RADIUS = 50; 

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([49.4355, 8.8090], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function loadData() {
            try {
                const res = await fetch(`${BACKEND_URL}/pois`);
                pois = await res.json();
                renderMarkers();
            } catch (e) { console.error("Data load failed", e); }
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m.marker));
            pois.forEach(poi => {
                const icon = L.divIcon({
                    html: `<div class="custom-marker"><div class="marker-dot">${poi.emoji || '📍'}</div></div>`,
                    className: '', iconSize: [40, 40], iconAnchor: [20, 20]
                });
                const marker = L.marker([poi.lat, poi.lng], { icon }).addTo(map).on('click', () => openSheet(poi));
                markers.push({ marker, poi });
            });
        }

        function gotoCity(city) {
            if (city === 'Schoenau') map.setView([49.4355, 8.8090], 16);
            else if (city === 'Mannheim') map.setView([49.4836, 8.4660], 15);
        }

        async function openSheet(poi) {
            const sheet = document.getElementById('bottomSheet');
            const content = document.getElementById('sheetContent');
            const audio = document.getElementById('audioElement');
            
            content.innerHTML = `<h2 class="text-2xl font-bold mb-2">${poi.name}</h2><p class="opacity-60 mb-4">${poi.city}</p>
                <div id="scriptText" class="text-sm italic opacity-80 mb-4 border-l-2 border-[#0ea5e9] pl-4">KI-Guide schreibt die Geschichte...</div>
                <div class="audio-player">
                    <div class="flex items-center gap-4 mb-2">
                        <div class="bg-[#0ea5e9] p-2 rounded-lg">🎙️</div>
                        <div class="text-sm font-semibold">KI-Guide Stimme</div>
                    </div>
                    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                </div>`;
            
            sheet.classList.add('open');

            try {
                const res = await fetch(`${BACKEND_URL}/poi/${poi.id}/audio`);
                const data = await res.json();
                if (data.script) document.getElementById('scriptText').innerText = data.script;
                let finalUrl = data.audio_url;
                if (!finalUrl.startsWith('http')) finalUrl = `${BACKEND_URL}${finalUrl}`;
                audio.src = finalUrl;
                audio.play();
                updateProgress();
            } catch (e) { console.warn("Audio load failed"); }
        }

        function updateProgress() {
            const audio = document.getElementById('audioElement');
            const fill = document.getElementById('progressFill');
            const interval = setInterval(() => {
                if (audio.duration) {
                    const pct = (audio.currentTime / audio.duration) * 100;
                    if (fill) fill.style.width = pct + '%';
                }
                if (audio.ended || audio.paused) clearInterval(interval);
            }, 100);
        }

        function closeSheet() {
            document.getElementById('bottomSheet').classList.remove('open');
            document.getElementById('audioElement').pause();
        }

        function startTour() {
            document.getElementById('startBtnContainer').style.display = 'none';
            const audio = document.getElementById('audioElement');
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(e => {});

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    const latlng = [latitude, longitude];
                    
                    if (!userLocationMarker) {
                        const userIcon = L.divIcon({ html: '<div class="user-location-dot"></div>', className: '', iconSize: [20, 20], iconAnchor: [10, 10] });
                        userLocationMarker = L.marker(latlng, { icon: userIcon }).addTo(map);
                        map.setView(latlng, 16);
                    } else {
                        userLocationMarker.setLatLng(latlng);
                    }
                    checkGeofences(latitude, longitude);
                }, err => {}, { enableHighAccuracy: true });
            }
        }

        function checkGeofences(uLat, uLng) {
            pois.forEach(poi => {
                const dist = Math.sqrt(Math.pow(uLat - poi.lat, 2) + Math.pow(uLng - poi.lng, 2)) * 111320;
                if (dist < GEOFENCE_RADIUS && lastTriggeredPoiId !== poi.id) {
                    lastTriggeredPoiId = poi.id;
                    openSheet(poi);
                }
            });
        }

        loadData();
    </script>
</body>
</html>
